<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3d0a">
<title>PIO Breakfast</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --dark: #141d0f;
  --green-deep: #1e3d0a;
  --green-mid: #3d6b1a;
  --green-light: #6aa032;
  --green-pale: #d6ecb8;
  --gold: #c8973a;
  --gold-light: #f0d080;
  --red: #e04848;
  --muted: rgba(20,29,15,0.5);
  --border: rgba(20,29,15,0.08);
  --shadow: 0 8px 32px rgba(20,29,15,0.08);
  --shadow-lg: 0 16px 48px rgba(20,29,15,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { -webkit-text-size-adjust:100%; }
body {
  background:var(--bg); color:var(--dark);
  font-family:'Inter',sans-serif; font-size:14px; line-height:1.5;
  min-height:100vh; padding-bottom:env(safe-area-inset-bottom,0);
  background-image:
    radial-gradient(circle at 15% 5%, rgba(200,151,58,0.06) 0%, transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(106,160,50,0.08) 0%, transparent 40%);
}

.app { max-width:520px; margin:0 auto; padding:16px 14px 30px; }

/* ── HEADER ── */
.header {
  background:linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 60%, var(--green-light) 100%);
  border-radius:22px; padding:24px 24px 22px;
  color:white; position:relative; overflow:hidden;
  box-shadow:var(--shadow-lg);
  margin-bottom:16px;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:160px; height:160px; border-radius:50%;
  background:rgba(255,255,255,0.05);
}
.header::after {
  content:''; position:absolute; bottom:-60px; left:-20px;
  width:180px; height:180px; border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.header-top {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px; position:relative; z-index:1;
}
.emoji-row { font-size:18px; letter-spacing:4px; opacity:0.85; }
.year-badge {
  background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.9);
  font-size:10px; font-weight:800; letter-spacing:2px;
  padding:3px 9px; border-radius:20px; text-transform:uppercase;
}
.title {
  font-family:'DM Serif Display',serif;
  font-size:26px; line-height:1.15; position:relative; z-index:1;
}
.title span { color:var(--gold-light); }
.subtitle {
  font-size:11.5px; color:rgba(255,255,255,0.65);
  margin-top:4px; position:relative; z-index:1;
  letter-spacing:0.2px;
}

/* ── CURRENT PAIR CARD ── */
.current-card {
  background:var(--surface); border-radius:22px;
  padding:22px 20px 20px; margin-bottom:16px;
  box-shadow:var(--shadow);
  border:1.5px solid var(--gold);
  position:relative; overflow:hidden;
}
.current-card::before {
  content:''; position:absolute; top:0; right:0;
  width:120px; height:120px;
  background:radial-gradient(circle, rgba(200,151,58,0.12) 0%, transparent 65%);
  pointer-events:none;
}
.current-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--gold); color:var(--dark);
  font-size:10px; font-weight:800; letter-spacing:1.5px;
  padding:4px 10px; border-radius:6px;
  text-transform:uppercase; margin-bottom:12px;
  position:relative; z-index:1;
}
.current-tag::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:var(--dark); animation:pulse 1.8s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.current-date {
  font-size:11.5px; color:var(--muted); font-weight:600;
  margin-bottom:3px; letter-spacing:0.3px;
  position:relative; z-index:1;
}
.current-title {
  font-size:20px; font-weight:800; color:var(--dark);
  line-height:1.2; margin-bottom:14px;
  position:relative; z-index:1;
}
.current-subtitle {
  font-size:12px; color:var(--muted); margin-bottom:18px;
  position:relative; z-index:1;
}

/* ── CONFIRM CARDS ── */
.confirm-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  margin-bottom:4px; position:relative; z-index:1;
}
.person-card {
  background:rgba(214,236,184,0.3);
  border:2px solid transparent;
  border-radius:16px; padding:14px 10px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  transition:all 0.25s ease;
}
.person-card.confirmed {
  background:linear-gradient(135deg, rgba(106,160,50,0.15), rgba(30,61,10,0.08));
  border-color:rgba(106,160,50,0.4);
}
.person-avatar {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-light));
  color:var(--dark);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; letter-spacing:-0.5px;
  box-shadow:0 3px 10px rgba(200,151,58,0.3);
}
.person-card.confirmed .person-avatar {
  background:linear-gradient(135deg, var(--green-mid), var(--green-light));
  color:white; box-shadow:0 3px 10px rgba(106,160,50,0.3);
}
.person-name {
  font-size:13px; font-weight:700; color:var(--dark);
  text-align:center; line-height:1.2;
  min-height:32px; display:flex; align-items:center; justify-content:center;
}
.confirm-btn {
  width:100%; padding:10px 8px;
  background:var(--green-deep); color:white;
  font-family:inherit; font-size:11.5px; font-weight:700;
  border:none; border-radius:11px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:5px;
  transition:all 0.2s;
  box-shadow:0 3px 10px rgba(30,61,10,0.25);
  letter-spacing:0.3px;
}
.confirm-btn:active { transform:scale(0.96); }
.confirm-btn.done {
  background:linear-gradient(135deg, var(--green-mid), var(--green-light));
  pointer-events:none;
  box-shadow:0 3px 10px rgba(106,160,50,0.25);
}
.confirm-btn .icon { font-size:12px; }
.confirm-who {
  font-size:10px; color:var(--muted); margin-top:6px;
  text-align:center; min-height:12px;
  font-style:italic;
}

.both-confirmed-banner {
  display:none; background:linear-gradient(135deg, var(--green-mid), var(--green-light));
  color:white; padding:12px 16px; border-radius:14px;
  text-align:center; font-size:13px; font-weight:700;
  margin-top:14px; position:relative; z-index:1;
  animation:slideIn 0.4s ease;
}
.both-confirmed-banner.show { display:block; }
@keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── TABLE SECTION ── */
.section-card {
  background:var(--surface); border-radius:20px;
  overflow:hidden; margin-bottom:14px;
  box-shadow:var(--shadow); border:1px solid var(--border);
}
.section-header {
  padding:14px 18px 10px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.section-title {
  font-size:12px; font-weight:800; color:var(--dark);
  letter-spacing:1.5px; text-transform:uppercase;
}
.section-count {
  font-size:10px; color:var(--muted); font-weight:600;
  background:rgba(20,29,15,0.05); padding:3px 9px; border-radius:20px;
}

.pair-row {
  display:flex; align-items:center; gap:10px;
  padding:11px 18px;
  border-bottom:1px solid var(--border);
  transition:background 0.15s;
}
.pair-row:last-child { border-bottom:none; }
.pair-row:active { background:rgba(106,160,50,0.04); }

.pair-num {
  width:24px; height:24px; border-radius:7px;
  background:rgba(20,29,15,0.04);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--muted);
  flex-shrink:0;
}
.pair-info { flex:1; min-width:0; }
.pair-names {
  font-size:13px; font-weight:600; color:var(--dark);
  line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.pair-date {
  font-size:11px; color:var(--muted); margin-top:1px;
  font-weight:500;
}
.pair-status {
  flex-shrink:0;
  font-size:10px; font-weight:700; letter-spacing:0.5px;
  padding:4px 9px; border-radius:20px;
  text-transform:uppercase;
}
.pair-status.done {
  background:rgba(106,160,50,0.1); color:var(--green-mid);
  border:1px solid rgba(106,160,50,0.22);
}
.pair-status.upcoming {
  background:rgba(20,29,15,0.04); color:var(--muted);
  border:1px solid rgba(20,29,15,0.06);
}

/* Done rows muted */
.pair-row.done .pair-names { color:var(--muted); }

/* ── FOOTER ── */
.footer {
  padding:16px 8px 8px;
  text-align:center;
  font-size:10.5px; color:var(--muted);
}
.footer strong { color:var(--green-mid); font-weight:700; }
.footer-divider { margin:0 6px; opacity:0.4; }

/* ── LOADING / TOAST ── */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--dark); color:white;
  padding:12px 20px; border-radius:14px;
  font-size:12px; font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  z-index:100; transition:transform 0.3s ease;
  max-width:90%;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.error { background:var(--red); }
.toast.success { background:var(--green-mid); }

.loading-overlay {
  position:fixed; inset:0; background:rgba(245,243,238,0.85);
  backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center;
  z-index:99;
}
.loading-overlay.show { display:flex; }
.spinner {
  width:40px; height:40px; border-radius:50%;
  border:3px solid rgba(30,61,10,0.15);
  border-top-color:var(--green-mid);
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* Responsive */
@media (max-width:380px) {
  .title { font-size:22px; }
  .current-title { font-size:18px; }
  .confirm-btn { font-size:10.5px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="emoji-row">☕ 🍳 🥐 🍽️</div>
      <div class="year-badge">2026</div>
    </div>
    <div class="title">PIO <span>Breakfast</span></div>
    <div class="subtitle">Weekly schedule · Every Wednesday</div>
  </div>

  <!-- CURRENT PAIR -->
  <div class="current-card" id="currentCard">
    <div class="current-tag">⚡ UP NEXT</div>
    <div class="current-date" id="currentDate">Loading...</div>
    <div class="current-title" id="currentNames">—</div>
    <div class="current-subtitle">Each person — tap your name to confirm 👇</div>

    <div class="confirm-grid">
      <div class="person-card" id="card1">
        <div class="person-avatar" id="avatar1">—</div>
        <div class="person-name" id="name1">Loading</div>
        <button class="confirm-btn" id="btn1" onclick="confirmPerson(1)">
          <span class="icon">👆</span> Tap to Confirm
        </button>
        <div class="confirm-who" id="who1"></div>
      </div>
      <div class="person-card" id="card2">
        <div class="person-avatar" id="avatar2">—</div>
        <div class="person-name" id="name2">Loading</div>
        <button class="confirm-btn" id="btn2" onclick="confirmPerson(2)">
          <span class="icon">👆</span> Tap to Confirm
        </button>
        <div class="confirm-who" id="who2"></div>
      </div>
    </div>

    <div class="both-confirmed-banner" id="bothBanner">
      🎉 Both confirmed! Breakfast is sorted for tomorrow ☕
    </div>
  </div>

  <!-- ALREADY SERVED -->
  <div class="section-card" id="doneSection">
    <div class="section-header">
      <div class="section-title">✅ Already Served</div>
      <div class="section-count" id="doneCount">0</div>
    </div>
    <div id="doneList"></div>
  </div>

  <!-- UPCOMING -->
  <div class="section-card" id="upcomingSection">
    <div class="section-header">
      <div class="section-title">📅 Upcoming</div>
      <div class="section-count" id="upcomingCount">0</div>
    </div>
    <div id="upcomingList"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>PIO Team</span>
    <span class="footer-divider">·</span>
    <strong>13 pairs</strong>
    <span class="footer-divider">·</span>
    <span>26 members</span>
    <span class="footer-divider">·</span>
    <span>Syncs live ✓</span>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<script>
// ════════════════════════════════════════
//  CONFIGURATION — UPDATE THESE
// ════════════════════════════════════════
const BIN_ID  = '69e4c323856a6821894d9f4b';
const API_KEY = '$2a$10$8IwSrqFkCAuOwOVyShw9z.5sKH1GJGi7joW5GtVNAExF.m7OIC6NS';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let data = { pairs: [] };
let isLoading = false;

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function initials(name) {
  return name.split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  isLoading = on;
}

// ════════════════════════════════════════
//  API
// ════════════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(`${API_URL}/latest`, {
      headers: { 'X-Access-Key': API_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) throw new Error('Load failed: ' + res.status);
    data = await res.json();
    render();
  } catch (err) {
    console.error(err);
    showToast('⚠️ Connection error — check API key', 'error');
  }
}

async function saveData() {
  try {
    setLoading(true);
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': API_KEY
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Save failed: ' + res.status);
    setLoading(false);
    return true;
  } catch (err) {
    console.error(err);
    setLoading(false);
    showToast('⚠️ Save failed — try again', 'error');
    return false;
  }
}

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
async function confirmPerson(which) {
  const current = data.pairs.find(p => p.status === 'pending');
  if (!current) return;

  const key = which === 1 ? 'p1ok' : 'p2ok';
  const name = which === 1 ? current.p1 : current.p2;

  if (current[key]) return; // already confirmed

  current[key] = true;

  // Auto-mark as done and advance when both confirmed
  if (current.p1ok && current.p2ok) {
    current.status = 'done';
    // Find next upcoming and promote to pending
    const next = data.pairs.find(p => p.status === 'upcoming');
    if (next) next.status = 'pending';
  }

  render();
  const ok = await saveData();
  if (ok) {
    showToast(`✅ ${name} confirmed!`, 'success');
  } else {
    // Rollback on failure
    current[key] = false;
    if (current.status === 'done') current.status = 'pending';
    render();
  }
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render() {
  const current = data.pairs.find(p => p.status === 'pending');
  const done    = data.pairs.filter(p => p.status === 'done');
  const upcoming = data.pairs.filter(p => p.status === 'upcoming');

  // Current pair card
  if (current) {
    document.getElementById('currentDate').textContent =
      `Wednesday · ${current.date}`;
    document.getElementById('currentNames').textContent =
      `${current.p1} & ${current.p2}`;

    document.getElementById('name1').textContent = current.p1;
    document.getElementById('name2').textContent = current.p2;
    document.getElementById('avatar1').textContent = initials(current.p1);
    document.getElementById('avatar2').textContent = initials(current.p2);

    const btn1 = document.getElementById('btn1');
    const btn2 = document.getElementById('btn2');
    const card1 = document.getElementById('card1');
    const card2 = document.getElementById('card2');
    const who1 = document.getElementById('who1');
    const who2 = document.getElementById('who2');

    if (current.p1ok) {
      btn1.classList.add('done');
      btn1.innerHTML = '<span class="icon">✅</span> Confirmed';
      card1.classList.add('confirmed');
      who1.textContent = 'Thank you!';
    } else {
      btn1.classList.remove('done');
      btn1.innerHTML = '<span class="icon">👆</span> Tap to Confirm';
      card1.classList.remove('confirmed');
      who1.textContent = '';
    }

    if (current.p2ok) {
      btn2.classList.add('done');
      btn2.innerHTML = '<span class="icon">✅</span> Confirmed';
      card2.classList.add('confirmed');
      who2.textContent = 'Thank you!';
    } else {
      btn2.classList.remove('done');
      btn2.innerHTML = '<span class="icon">👆</span> Tap to Confirm';
      card2.classList.remove('confirmed');
      who2.textContent = '';
    }

    document.getElementById('bothBanner').classList.toggle('show',
      current.p1ok && current.p2ok);
  } else {
    // No pending — all confirmed for cycle
    document.getElementById('currentDate').textContent = 'All done!';
    document.getElementById('currentNames').textContent = 'Rotation complete 🎉';
  }

  // Done list
  document.getElementById('doneCount').textContent = done.length;
  document.getElementById('doneList').innerHTML = done.map(p => `
    <div class="pair-row done">
      <div class="pair-num">${p.id}</div>
      <div class="pair-info">
        <div class="pair-names">${p.p1} &amp; ${p.p2}</div>
        <div class="pair-date">${p.date}</div>
      </div>
      <div class="pair-status done">✓ Done</div>
    </div>
  `).join('');

  // Upcoming list
  document.getElementById('upcomingCount').textContent = upcoming.length;
  document.getElementById('upcomingList').innerHTML = upcoming.map(p => `
    <div class="pair-row">
      <div class="pair-num">${p.id}</div>
      <div class="pair-info">
        <div class="pair-names">${p.p1} &amp; ${p.p2}</div>
        <div class="pair-date">${p.date}</div>
      </div>
      <div class="pair-status upcoming">Upcoming</div>
    </div>
  `).join('');

  // Hide empty sections
  document.getElementById('doneSection').style.display = done.length ? '' : 'none';
  document.getElementById('upcomingSection').style.display = upcoming.length ? '' : 'none';
}

// ════════════════════════════════════════
//  LIVE SYNC — poll every 4s when app is visible
// ════════════════════════════════════════
let pollTimer = null;
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(() => {
    if (!document.hidden && !isLoading) loadData();
  }, 4000);
}
function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopPolling();
  else { loadData(); startPolling(); }
});

// Initial load
loadData().then(startPolling);
</script>
</body>
</html>
